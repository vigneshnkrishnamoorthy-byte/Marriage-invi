<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vignesh ❤️ Sowndharya</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

:root {
  --gold: #f0c040;
  --gold2: #ffda6a;
  --red: #e50914;
  --crimson: #ff1744;
  --white: #fff8f0;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: 'Cinzel', serif;
}

/* ── 9:16 vertical stage ── */
.stage {
  position: relative;
  width: min(100vw, calc(100vh * 9/16));
  height: min(100vh, calc(100vw * 16/9));
  background: #000;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── film grain ── */
.grain {
  position: absolute; inset: 0; z-index: 999; pointer-events: none;
  opacity: .18;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 160px 160px;
  mix-blend-mode: overlay;
  animation: grainShift .06s steps(1) infinite;
}
@keyframes grainShift {
  0%   { background-position: 0 0 }
  25%  { background-position: 50px -30px }
  50%  { background-position: -20px 60px }
  75%  { background-position: 70px 15px }
  100% { background-position: -5px -50px }
}

/* ── vignette ── */
.vignette {
  position: absolute; inset: 0; z-index: 998; pointer-events: none;
  background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 20%, rgba(0,0,0,.88) 100%);
}

/* ══════════════════════════════════
   PHASE 1 – RED BEAM
══════════════════════════════════ */
.beam-container {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
  opacity: 0;
}

.beam-main {
  position: absolute;
  width: 4px;
  height: 0%;
  background: linear-gradient(180deg, transparent 0%, #fff 10%, var(--red) 40%, var(--crimson) 60%, #fff 90%, transparent 100%);
  box-shadow:
    0 0 8px 4px rgba(229,9,20,.9),
    0 0 30px 12px rgba(229,9,20,.6),
    0 0 80px 30px rgba(229,9,20,.3),
    0 0 160px 60px rgba(229,9,20,.1);
  border-radius: 2px;
  animation: beamGrow 0.6s cubic-bezier(.2,0,.1,1) forwards;
}
@keyframes beamGrow {
  from { height: 0%; opacity: 0; }
  to   { height: 100%; opacity: 1; }
}

/* ══════════════════════════════════
   PHASE 2 – LIGHT STREAKS
══════════════════════════════════ */
.streaks {
  position: absolute; inset: 0; z-index: 11;
  opacity: 0;
  pointer-events: none;
}
.streak {
  position: absolute;
  top: 50%;
  left: 50%;
  height: 2px;
  border-radius: 1px;
  transform-origin: left center;
  opacity: 0;
}

/* ══════════════════════════════════
   PHASE 3 – MONOGRAM VS
══════════════════════════════════ */
.monogram-wrap {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 20;
  opacity: 0;
}

.monogram {
  position: relative;
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(90px, 22vw, 160px);
  font-weight: 900;
  letter-spacing: -4px;
  background: linear-gradient(135deg,
    #fff8e1 0%,
    var(--gold2) 20%,
    var(--gold) 40%,
    #fff 55%,
    var(--gold) 70%,
    #c8860a 85%,
    var(--gold2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 30px rgba(240,192,64,.8)) drop-shadow(0 0 60px rgba(240,192,64,.4));
  text-shadow: none;
  transform: scale(1.4);
  opacity: 0;
}

/* golden shimmer sweep across VS */
.monogram::after {
  content: 'VS';
  position: absolute;
  inset: 0;
  font-family: 'Cinzel Decorative', serif;
  font-size: inherit;
  font-weight: 900;
  letter-spacing: -4px;
  background: linear-gradient(105deg,
    transparent 30%,
    rgba(255,255,255,.9) 50%,
    transparent 70%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  background-size: 200% 100%;
  animation: shimmerSweep 2.5s ease 1s infinite;
}
@keyframes shimmerSweep {
  0%   { background-position: -100% 0 }
  60%  { background-position: 200% 0 }
  100% { background-position: 200% 0 }
}

/* radial glow behind monogram */
.monogram-glow {
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(240,192,64,.25) 0%, rgba(229,9,20,.08) 40%, transparent 70%);
  filter: blur(20px);
  opacity: 0;
}

/* ══════════════════════════════════
   PHASE 4 – NAMES TEXT
══════════════════════════════════ */
.names-wrap {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 30;
  gap: 14px;
  opacity: 0;
}

.names-line {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(18px, 5vw, 32px);
  font-weight: 400;
  letter-spacing: 3px;
  background: linear-gradient(135deg, #fff8e1, var(--gold2), #fff, var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 16px rgba(240,192,64,.7));
  text-align: center;
  opacity: 0;
  transform: translateY(12px);
}

.heart {
  font-size: clamp(20px, 5vw, 36px);
  -webkit-text-fill-color: initial;
  color: var(--crimson);
  filter: drop-shadow(0 0 12px rgba(255,23,68,.9));
  animation: heartbeat 1.4s ease-in-out infinite;
  opacity: 0;
}
@keyframes heartbeat {
  0%,100% { transform: scale(1); }
  14%      { transform: scale(1.18); }
  28%      { transform: scale(1); }
  42%      { transform: scale(1.1); }
  56%      { transform: scale(1); }
}

.ornament-line {
  display: flex; align-items: center; gap: 12px;
  opacity: 0;
}
.ornament-line span {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(11px, 2.5vw, 14px);
  letter-spacing: 5px;
  color: #b8924a;
  text-transform: uppercase;
}
.orn-dash {
  width: 40px; height: 1px;
  background: linear-gradient(90deg, transparent, #b8924a, transparent);
}

/* ══════════════════════════════════
   PHASE 5 – SAVE THE DATE
══════════════════════════════════ */
.std-wrap {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 35; gap: 8px;
  opacity: 0;
}

.std-text {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(22px, 6vw, 42px);
  font-weight: 700;
  letter-spacing: 6px;
  text-transform: uppercase;
  background: linear-gradient(135deg, #fff8e1 0%, var(--gold2) 30%, #fff 55%, var(--gold) 80%, #c8860a 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 20px rgba(240,192,64,.9)) drop-shadow(0 0 50px rgba(240,192,64,.4));
  opacity: 0;
  transform: scale(.9);
}

/* sparkles around "Save The Date" */
.sparkle {
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--gold2);
  opacity: 0;
  box-shadow: 0 0 6px 3px rgba(240,192,64,.9);
}

/* ══════════════════════════════════
   PHASE 6 – EVENT DATES
══════════════════════════════════ */
.events-wrap {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding-bottom: 12%;
  display: flex; flex-direction: column;
  align-items: center;
  gap: 18px;
  z-index: 36;
  opacity: 0;
}

.event-card {
  text-align: center;
  opacity: 0;
  transform: translateY(20px);
}

.event-type {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(14px, 3.5vw, 22px);
  font-weight: 700;
  letter-spacing: 4px;
  background: linear-gradient(135deg, #fff8e1, var(--gold2), #fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 12px rgba(240,192,64,.8));
}

.event-date {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(13px, 3vw, 18px);
  font-weight: 300;
  font-style: italic;
  letter-spacing: 3px;
  color: #d4a84b;
  margin-top: 4px;
  filter: drop-shadow(0 0 8px rgba(212,168,75,.6));
}

.events-divider {
  width: 1px; height: 30px;
  background: linear-gradient(180deg, transparent, #b8924a, transparent);
  opacity: 0;
}

/* ══════════════════════════════════
   PHASE 7 – PARTICLES
══════════════════════════════════ */
.particles {
  position: absolute; inset: 0; z-index: 5; pointer-events: none;
}
.particle {
  position: absolute;
  border-radius: 50%;
  background: var(--gold2);
  opacity: 0;
  box-shadow: 0 0 4px 2px rgba(240,192,64,.6);
}

/* ══════════════════════════════════
   FADE TO BLACK
══════════════════════════════════ */
.fade-out {
  position: absolute; inset: 0; z-index: 997;
  background: #000;
  opacity: 0;
  pointer-events: none;
}

/* ══════════════════════════════════
   REPLAY
══════════════════════════════════ */
.replay-btn {
  position: absolute; bottom: 4%; left: 50%; transform: translateX(-50%);
  z-index: 1000;
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px;
  color: #555; border: 1px solid #2a2a2a; background: transparent;
  padding: 9px 22px; cursor: pointer; text-transform: uppercase;
  transition: all .4s; opacity: 0;
}
.replay-btn:hover { color: var(--gold); border-color: #555; }
.replay-btn.show  { opacity: 1; }

</style>
</head>
<body>

<div class="stage" id="stage">

  <!-- atmosphere -->
  <div class="grain"></div>
  <div class="vignette"></div>
  <div class="fade-out" id="fadeOut"></div>

  <!-- Phase 1: Red beam -->
  <div class="beam-container" id="beamContainer">
    <div class="beam-main" id="beamMain"></div>
  </div>

  <!-- Phase 2: Streaks -->
  <div class="streaks" id="streaks"></div>

  <!-- Phase 3: VS Monogram -->
  <div class="monogram-wrap" id="monogramWrap">
    <div class="monogram-glow" id="monoGlow"></div>
    <div class="monogram" id="monogram">VS</div>
  </div>

  <!-- Phase 4: Names -->
  <div class="names-wrap" id="namesWrap">
    <div class="ornament-line" id="ornTop">
      <div class="orn-dash"></div>
      <span>Forever Begins</span>
      <div class="orn-dash"></div>
    </div>
    <div class="names-line" id="name1">Vignesh</div>
    <div class="heart" id="heart">❤️</div>
    <div class="names-line" id="name2">Sowndharya</div>
    <div class="ornament-line" id="ornBot">
      <div class="orn-dash"></div>
      <span>Two Souls, One Journey</span>
      <div class="orn-dash"></div>
    </div>
  </div>

  <!-- Phase 5: Save The Date -->
  <div class="std-wrap" id="stdWrap">
    <div class="std-text" id="stdText">Save The Date</div>
  </div>

  <!-- Phase 6: Events -->
  <div class="events-wrap" id="eventsWrap">
    <div class="event-card" id="ev1">
      <div class="event-type">Reception</div>
      <div class="event-date">March 14 · 2026</div>
    </div>
    <div class="events-divider" id="evDiv"></div>
    <div class="event-card" id="ev2">
      <div class="event-type">Wedding</div>
      <div class="event-date">March 15 · 2026</div>
    </div>
  </div>

  <!-- Phase 7: Particles canvas -->
  <div class="particles" id="particles"></div>

  <button class="replay-btn" id="replayBtn" onclick="startShow(true)">↺ &nbsp; Replay</button>
</div>

<script>
/* ═══════════════════════════════════
   WEB AUDIO – cinematic TA-DUM
═══════════════════════════════════ */
function playTaDum() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    function boom(freq, start, dur, gain) {
      const osc  = ctx.createOscillator();
      const gain1 = ctx.createGain();
      const dist  = ctx.createWaveShaper();

      // gentle distortion for warmth
      const curve = new Float32Array(256);
      for (let i = 0; i < 256; i++) {
        const x = (i * 2) / 256 - 1;
        curve[i] = (Math.PI + 200) * x / (Math.PI + 200 * Math.abs(x));
      }
      dist.curve = curve;

      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.4, ctx.currentTime + start + dur);

      gain1.gain.setValueAtTime(0, ctx.currentTime + start);
      gain1.gain.linearRampToValueAtTime(gain, ctx.currentTime + start + 0.01);
      gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);

      osc.connect(dist);
      dist.connect(gain1);
      gain1.connect(ctx.destination);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur + 0.05);
    }

    function rumble(start) {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 1.5, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.15;
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 80;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, ctx.currentTime + start);
      g.gain.linearRampToValueAtTime(0.4, ctx.currentTime + start + 0.1);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + 1.4);
      src.connect(filter);
      filter.connect(g);
      g.connect(ctx.destination);
      src.start(ctx.currentTime + start);
    }

    // TA  (first hit – lower)
    boom(55, 0,    1.2, 1.0);
    boom(110, 0,   0.8, 0.6);
    rumble(0);

    // DUM (second hit – higher pitch, more impact)
    boom(80, 0.55, 1.5, 1.2);
    boom(160, 0.55, 0.9, 0.5);
    boom(40, 0.55, 1.8, 0.8);
    rumble(0.55);

    // orchestral swell (strings-ish)
    function swell(freq, start, dur, vol) {
      const osc = ctx.createOscillator();
      const g   = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0, ctx.currentTime + start);
      g.gain.linearRampToValueAtTime(vol, ctx.currentTime + start + 0.3);
      g.gain.linearRampToValueAtTime(vol * 0.6, ctx.currentTime + start + dur - 0.3);
      g.gain.linearRampToValueAtTime(0, ctx.currentTime + start + dur);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur);
    }
    // gentle chord swell after the hit
    [261.6, 329.6, 392, 523.2].forEach((f, i) =>
      swell(f, 1.2 + i * 0.12, 3.5, 0.06)
    );

  } catch(e) { console.log('Audio not available'); }
}

/* ═══════════════════════════════════
   HELPERS
═══════════════════════════════════ */
function $(id) { return document.getElementById(id); }

function css(el, props) { Object.assign(el.style, props); }

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function animate(el, keyframes, options) {
  return el.animate(keyframes, { fill: 'forwards', easing: 'ease', ...options });
}

/* ═══════════════════════════════════
   STREAKS
═══════════════════════════════════ */
function buildStreaks() {
  const container = $('streaks');
  container.innerHTML = '';
  const stage = $('stage');
  const W = stage.clientWidth, H = stage.clientHeight;
  const cx = W / 2, cy = H / 2;

  const streakDefs = [
    { angle:   0, len: W * 0.9, color: '#e50914', w: 3, delay: 0 },
    { angle:  30, len: W * 0.7, color: '#ff6f00', w: 2, delay: 60 },
    { angle: -30, len: W * 0.7, color: '#ff1744', w: 2, delay: 60 },
    { angle:  60, len: W * 0.55, color: '#ffd740', w: 1.5, delay: 120 },
    { angle: -60, len: W * 0.55, color: '#ffd740', w: 1.5, delay: 120 },
    { angle:  90, len: H * 0.8, color: '#fff8e1', w: 1, delay: 180 },
    { angle: -90, len: H * 0.8, color: '#fff8e1', w: 1, delay: 180 },
    { angle: 120, len: W * 0.45, color: '#ff6f00', w: 1, delay: 200 },
    { angle:-120, len: W * 0.45, color: '#ff6f00', w: 1, delay: 200 },
    { angle: 150, len: W * 0.4, color: '#e50914', w: 1, delay: 240 },
    { angle:-150, len: W * 0.4, color: '#e50914', w: 1, delay: 240 },
    { angle: 180, len: W * 0.9, color: '#e50914', w: 3, delay: 0  },
  ];

  streakDefs.forEach(s => {
    const el = document.createElement('div');
    el.className = 'streak';
    const rad = s.angle * Math.PI / 180;
    const ex = cx + Math.cos(rad) * s.len;
    const ey = cy + Math.sin(rad) * s.len;
    const dx = ex - cx, dy = ey - cy;
    const len = Math.sqrt(dx*dx + dy*dy);
    const angleDeg = Math.atan2(dy, dx) * 180 / Math.PI;

    el.style.cssText = `
      left: ${cx}px; top: ${cy}px;
      width: 0px; height: ${s.w}px;
      background: linear-gradient(90deg, rgba(255,255,255,0.9), ${s.color}, transparent);
      transform: rotate(${angleDeg}deg);
      box-shadow: 0 0 8px 2px ${s.color}99;
      transform-origin: left center;
      opacity: 0;
    `;
    container.appendChild(el);

    setTimeout(() => {
      el.animate([
        { width: '0px', opacity: 0 },
        { width: len + 'px', opacity: 1 },
        { width: len + 'px', opacity: 0.8 }
      ], { duration: 400, fill: 'forwards', easing: 'cubic-bezier(.2,0,.1,1)' });
    }, s.delay);
  });
}

/* ═══════════════════════════════════
   PARTICLES
═══════════════════════════════════ */
function spawnParticles() {
  const container = $('particles');
  container.innerHTML = '';
  const stage = $('stage');
  const W = stage.clientWidth, H = stage.clientHeight;

  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 1;
    const x = Math.random() * W;
    const y = Math.random() * H;
    const colors = ['#f0c040','#ffda6a','#fff8e1','#e50914','#ff6f00'];
    const col = colors[Math.floor(Math.random() * colors.length)];
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${x}px; top:${y}px;
      background:${col};
      box-shadow:0 0 ${size*2}px ${size}px ${col}88;
    `;
    container.appendChild(p);

    const delay = Math.random() * 4000;
    const dur   = Math.random() * 3000 + 2000;
    const dy    = -(Math.random() * 120 + 40);
    const dx    = (Math.random() - 0.5) * 60;

    p.animate([
      { opacity: 0, transform: 'translate(0,0) scale(0)' },
      { opacity: 1, transform: `translate(${dx/2}px,${dy/2}px) scale(1)`, offset: 0.3 },
      { opacity: 0, transform: `translate(${dx}px,${dy}px) scale(0.3)` }
    ], { duration: dur, delay, fill: 'forwards', easing: 'ease-out' });
  }
}

/* ═══════════════════════════════════
   MAIN SEQUENCE
═══════════════════════════════════ */
let timeouts = [];
function T(fn, ms) {
  const id = setTimeout(fn, ms);
  timeouts.push(id);
  return id;
}

async function startShow(reset) {
  timeouts.forEach(clearTimeout); timeouts = [];

  if (reset) {
    // hard reset
    location.reload(); return;
  }

  /* small silence before anything */
  await wait(600);

  /* ── PHASE 1: TA-DUM + Red beam (t=0.6s) ── */
  playTaDum();

  const bc = $('beamContainer');
  bc.style.opacity = '1';
  // beam grows via CSS animation (triggered by making it visible)
  const bm = $('beamMain');
  bm.style.animation = 'beamGrow 0.55s cubic-bezier(.2,0,.1,1) forwards';

  await wait(300);

  /* ── PHASE 2: Streaks burst out (t=0.9s) ── */
  $('streaks').style.opacity = '1';
  buildStreaks();

  await wait(700);

  /* ── PHASE 3: VS Monogram rises (t=1.6s) ── */
  const mw = $('monogramWrap');
  const mg = $('monoGlow');
  const mm = $('monogram');

  mw.style.opacity = '1';
  mg.animate([
    { opacity: 0, transform: 'scale(0.5)' },
    { opacity: 1, transform: 'scale(1)' }
  ], { duration: 800, fill: 'forwards', easing: 'ease-out' });
  mm.animate([
    { opacity: 0, transform: 'scale(1.6)', filter: 'blur(20px) drop-shadow(0 0 60px rgba(229,9,20,1))' },
    { opacity: 1, transform: 'scale(1)',   filter: 'drop-shadow(0 0 30px rgba(240,192,64,.8)) drop-shadow(0 0 60px rgba(240,192,64,.4))' }
  ], { duration: 900, fill: 'forwards', easing: 'cubic-bezier(.2,0,.05,1)' });

  // screen shake on the dum hit
  const stage = $('stage');
  stage.animate([
    { transform: 'translate(0,0)' },
    { transform: 'translate(-4px,3px)' },
    { transform: 'translate(4px,-3px)' },
    { transform: 'translate(-2px,2px)' },
    { transform: 'translate(0,0)' }
  ], { duration: 300, fill: 'forwards' });

  /* fade out beam + streaks */
  T(() => {
    $('beamContainer').animate([{opacity:1},{opacity:0}], {duration:600, fill:'forwards'});
    $('streaks').animate([{opacity:1},{opacity:0}], {duration:800, fill:'forwards'});
  }, 400);

  await wait(2200);

  /* ── PHASE 4: Names transform from VS (t=3.8s) ── */
  // VS fades out while names fade in
  mm.animate([{opacity:1},{opacity:0, transform:'scale(0.85)', filter:'blur(10px)'}],
    {duration:700, fill:'forwards', easing:'ease-in'});
  mg.animate([{opacity:1},{opacity:0}], {duration:700, fill:'forwards'});

  await wait(400);

  const nw = $('namesWrap');
  nw.style.opacity = '1';
  mw.style.opacity = '0';

  // animate names in sequence
  const n1 = $('name1'), hrt = $('heart'), n2 = $('name2');
  const ornT = $('ornTop'), ornB = $('ornBot');

  [ornT, n1, hrt, n2, ornB].forEach((el, i) => {
    T(() => {
      el.animate([
        { opacity: 0, transform: 'translateY(18px)' },
        { opacity: 1, transform: 'translateY(0)' }
      ], { duration: 700, fill: 'forwards', easing: 'cubic-bezier(.2,0,.1,1)' });
    }, i * 200);
  });

  await wait(3200);

  /* ── PHASE 5: Save The Date (t=7.0s) ── */
  // names fade out gently
  nw.animate([{opacity:1},{opacity:0}], {duration:700, fill:'forwards', easing:'ease-in'});
  await wait(500);

  const sw = $('stdWrap');
  const st = $('stdText');
  sw.style.opacity = '1';
  st.animate([
    { opacity:0, transform:'scale(.85)', filter:'blur(8px)' },
    { opacity:1, transform:'scale(1)',   filter:'drop-shadow(0 0 20px rgba(240,192,64,.9)) drop-shadow(0 0 50px rgba(240,192,64,.4))' }
  ], { duration:1000, fill:'forwards', easing:'cubic-bezier(.2,0,.05,1)' });

  // sparkles around it
  spawnSparkles();

  await wait(2800);

  /* ── PHASE 6: Event dates slide up (t=10.3s) ── */
  // std fades out
  sw.animate([{opacity:1},{opacity:0}], {duration:600, fill:'forwards', easing:'ease-in'});
  await wait(400);

  const ew = $('eventsWrap');
  ew.style.opacity = '1';
  ew.animate([{opacity:0},{opacity:1}], {duration:400, fill:'forwards'});

  [$('ev1'), $('evDiv'), $('ev2')].forEach((el,i) => {
    T(() => {
      el.animate([
        { opacity:0, transform:'translateY(24px)' },
        { opacity:1, transform:'translateY(0)' }
      ], { duration:800, fill:'forwards', easing:'cubic-bezier(.2,0,.1,1)' });
    }, i * 300);
  });

  /* also bring names back as watermark behind */
  await wait(1000);

  /* ── PHASE 7: Particles float (t=11.6s) ── */
  spawnParticles();

  await wait(4500);

  /* ── PHASE 8: Fade to black (t=16.1s) ── */
  const fo = $('fadeOut');
  fo.animate([{opacity:0},{opacity:1}], {duration:2000, fill:'forwards', easing:'ease-in'});

  T(() => {
    $('replayBtn').classList.add('show');
    fo.style.opacity = '0';
    fo.animate([{opacity:1},{opacity:0}], {duration:1500, fill:'forwards'});
  }, 2500);
}

/* sparkles for STD phase */
function spawnSparkles() {
  const wrap = $('stdWrap');
  for (let i = 0; i < 24; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const size = Math.random() * 5 + 2;
    const angle = Math.random() * Math.PI * 2;
    const radius = Math.random() * 140 + 40;
    const x = Math.cos(angle) * radius;
    const y = Math.sin(angle) * radius;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:calc(50% + ${x}px); top:calc(50% + ${y}px);
    `;
    wrap.appendChild(s);
    s.animate([
      { opacity:0, transform:'scale(0)' },
      { opacity:1, transform:'scale(1)', offset: 0.4 },
      { opacity:0, transform:'scale(0)' }
    ], {
      duration: Math.random() * 1200 + 800,
      delay: Math.random() * 1600,
      fill: 'forwards',
      easing: 'ease-out'
    });
  }
}

/* kick off on first click/tap (needed for AudioContext) */
let started = false;
document.addEventListener('click', () => {
  if (!started) { started = true; startShow(false); }
});
document.addEventListener('touchstart', () => {
  if (!started) { started = true; startShow(false); }
}, { passive: true });

/* auto-start after short delay (works if audio already unlocked) */
setTimeout(() => {
  if (!started) { started = true; startShow(false); }
}, 800);
</script>
</body>
